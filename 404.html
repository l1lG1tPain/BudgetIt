<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Страница не найдена — BudgetIt</title>

  <!-- основные стили приложения -->
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* ===== БАЗА ===== */
    html,body{height:100%;margin:0;}
    body{
      position:relative;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background:var(--dark-color);color:var(--tertiary-color);
      font-family: 'Montserrat';
      text-align:center;
      overflow:hidden;
    }

    /* ===== 404-фон ===== */
    h1.big-404{
      position:absolute;
      top:25%;
      left:49%;
      transform:translate(-50%,-55%);
      margin:0;
      font-size:clamp(200px,35vw,420px);
      line-height:.8;
      font-weight:700;
      opacity:.9;
      /* background:linear-gradient(135deg,#007aff,#ffffff); */
      background: #ffffff;
      filter: drop-shadow(0 0 30px rgba(255,255,255,0.6));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      user-select:none;pointer-events:none;
    }

    h1{
        color: #ffffff;
    }

    /* ===== изображение Акулки ===== */
    .shark{
      position:relative;
      z-index:2;
      width:min(500px,90vw);
      max-width:580px;
    }
    .shark img{
      width:100%;
      height:auto;
      display:block;
      filter:drop-shadow(0 12px 18px rgba(0,0,0,.45));
      animation:float 6s ease-in-out infinite;
    }
    @keyframes float{
        0%,100%{
            transform:translateY(0)
        }
        50%{transform:translateY(-36px)}
    }

    /* ===== сообщение ===== */
    p{
        font-size:1.25rem;
        max-width:480px;
        margin:18px 20px 28px;
        z-index:2;}

    /* ===== кнопка + подпись (прижаты к низу) ===== */
    .actions{
      position:absolute;
      bottom:6vh;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      width:90%;
      max-width:480px;
      z-index:3;
    }
    button{
      width:100%;
      /* background:var(--primary-color); */
      background: #ffffff;
      color:var(--secondary-color);
      border:none;padding:12px 28px;
      border-radius:10px;
      font-size:1.2rem;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 4px 12px rgba(0,0,0,.35);
      transition:transform .2s,box-shadow .2s,background .3s;
    }
    button:hover{
      transform:translateY(-2px);
      box-shadow:0 6px 18px rgba(0,0,0,.45);
      background:var(--secondary-color);
      color: #ffffff;
    }
    .tiny{ 
        margin:0;
        font-size:.85rem;
        opacity:.6;
        text-align:center;
    }
    a{
        color:inherit;
    }
    /* === BudgetIt Error CTA === */
    .error-cta {
        width: 100%;
        padding: 14px 20px;

        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.02em;

        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.12);

        background:
                linear-gradient(
                        135deg,
                        rgba(43,232,42,0.18),
                        rgba(43,232,42,0.04)
                );

        color: var(--secondary-color);

        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);

        box-shadow:
                0 6px 20px rgba(0,0,0,0.45),
                0 0 0 1px rgba(43,232,42,0.25);

        cursor: pointer;
        transition:
                transform 0.15s ease,
                box-shadow 0.2s ease,
                background 0.25s ease;
    }

    /* hover */
    .error-cta:hover {
        transform: translateY(-2px);
        box-shadow:
                0 10px 28px rgba(0,0,0,0.55),
                0 0 0 1px rgba(43,232,42,0.45);
    }

    /* active */
    .error-cta:active {
        transform: translateY(1px) scale(0.98);
    }

    /* disabled (offline reload) */
    .error-cta:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        box-shadow: none;
    }

  </style>
</head>
<body>
  <header>
    <h1 id="current-budget" title="На главную" onclick="location.href='/'">BudgetIt</h1>
  </header>
    
  <!-- гигантские цифры (фон) -->
  <h1 class="big-404">404</h1>

  <!-- картинка -->
  <div class="shark" role="img" aria-label="Shark">
    <img src="assets/404.png" alt="🦈 Shark illustration">
  </div>

  <!-- сообщение -->
  <p>Ой! Похоже, вы заплыли не туда.<br>Но Акулка поможет вернуться на главную.</p>

  <!-- действия: кнопка + (опционально) контакт -->
  <div class="actions">
      <button class="error-cta" onclick="location.href='/'">🏠 Домой</button>
    <!-- если нужна подпись, раскомментируйте строку ниже -->
    <!-- <div class="tiny">Если считаете, что это ошибка, <a href="mailto:support@budgetit.app">support@budgetit.app</a></div> -->
  </div>

  <script>
    setTimeout(()=>location.href='/',7000);
  </script>
  
</body>
</html>
